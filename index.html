<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Conversa — Better workplace communication</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cpath d='M12,26 A21,21 0 0 1 50,21' fill='none' stroke='%2317305e' stroke-width='7' stroke-linecap='round'/%3E%3Cpath d='M53,28 A21,21 0 0 1 51,39' fill='none' stroke='%23a9c6e8' stroke-width='7' stroke-linecap='round'/%3E%3Cpath d='M47,46 A21,21 0 0 1 15,40' fill='none' stroke='%232f6fe6' stroke-width='7' stroke-linecap='round'/%3E%3Cpath d='M24,50 L15,60 L31,52 Z' fill='%232f6fe6'/%3E%3Ccircle cx='23' cy='31' r='3.1' fill='%2317305e'/%3E%3Ccircle cx='32' cy='31' r='3.1' fill='%2317305e'/%3E%3Ccircle cx='41' cy='31' r='3.1' fill='%2317305e'/%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,wght@0,400;0,600;0,700;0,800;0,900;1,400&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="mvs-header"></div>
  <div class="mvs-hero-band">
    <div class="mvs-hero-shape" aria-hidden="true"></div>
    <div class="mvs-hero-content">
      <svg class="mvs-hero-logo" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Conversa logo">
        <path class="cv-arc cv-arc--navy" stroke-width="7" d="M12,26 A21,21 0 0 1 50,21" />
        <path class="cv-arc cv-arc--light" stroke-width="7" d="M53,28 A21,21 0 0 1 51,39" />
        <path class="cv-arc cv-arc--blue" stroke-width="7" d="M47,46 A21,21 0 0 1 15,40" />
        <path class="cv-tail" d="M24,50 L15,60 L31,52 Z" />
        <circle class="cv-dot" cx="23" cy="31" r="3.1" />
        <circle class="cv-dot" cx="32" cy="31" r="3.1" />
        <circle class="cv-dot" cx="41" cy="31" r="3.1" />
      </svg>
      <div class="mvs-hero-word"><strong>Conversa</strong><span>Better workplace communication</span></div>
      <h1 class="mvs-hero-title" id="home-hero-title"></h1>
      <p class="mvs-hero-lead" id="home-hero-lead"></p>
    </div>
  </div>
  <main id="home-app" class="mvs-app"></main>

  <script src="js/content.js"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/nav.js"></script>
  <script>
    Nav.mount({ active: "home" });
  </script>
  <script>
    (function () {
      // Simple inline glyphs — one per tool tile, white strokes on a
      // solid colour circle. Deliberately plain/geometric, drawn inline
      // rather than pulled from any external icon library.
      const ICONS = {
        reflection: `
          <svg viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="5" y="4" width="14" height="17" rx="2" />
            <path d="M9 4V3a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v1" />
            <path d="M8.5 13l2 2 4-4" />
          </svg>`,
        guide: `
          <svg viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 6.5C10.4 5.1 7.6 4.6 4 5.2v13c3.6-.6 6.4-.1 8 1.3 1.6-1.4 4.4-1.9 8-1.3v-13c-3.6-.6-6.4-.1-8 1.3Z" />
            <path d="M12 6.5v13" />
          </svg>`,
        team: `
          <svg viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="9" cy="8" r="3" />
            <path d="M3.5 20a5.5 5.5 0 0 1 11 0" />
            <circle cx="17.5" cy="9" r="2.5" />
            <path d="M14.5 14.2a5 5 0 0 1 8 4.8" />
          </svg>`,
        blindspot: `
          <svg viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z" />
            <circle cx="12" cy="12" r="3" />
          </svg>`,
      };

      const c = CONTENT.home;
      document.getElementById("home-hero-title").textContent = c.title;
      document.getElementById("home-hero-lead").textContent = c.intro;

      function secondaryCard(card) {
        return `
          <a class="mvs-tool-tile mvs-tool-tile--${card.accent}" href="${card.href}">
            <span class="mvs-tool-icon">${ICONS[card.icon] || ""}</span>
            <h3>${card.title}</h3>
            <p>${card.body}</p>
            <span class="mvs-tool-status" data-card="${card.icon}"></span>
          </a>`;
      }

      const root = document.getElementById("home-app");
      root.innerHTML = `
        <div class="mvs-home">
          <div id="home-welcome" class="mvs-home-welcome" hidden></div>

          <section class="mvs-home-step">
            <p class="mvs-step-eyebrow">${c.step1Eyebrow}</p>
            <a class="mvs-feature-card" href="${c.featureHref}" id="home-feature-card">
              <span class="mvs-feature-pill">${c.featurePill}</span>
              <span class="mvs-feature-icon">${ICONS.reflection}</span>
              <span class="mvs-feature-text">
                <h2>${c.featureTitle}</h2>
                <p>${c.featureBody}</p>
                <span class="mvs-feature-meta">
                  <span class="mvs-feature-time">${c.featureTime}</span>
                  <span class="mvs-feature-required">${c.featureRequired}</span>
                </span>
                <span class="mvs-feature-status" id="home-feature-status" hidden></span>
              </span>
              <span class="mvs-btn mvs-btn--primary mvs-feature-cta" id="home-feature-cta">${c.featureCta}</span>
            </a>
          </section>

          <section class="mvs-home-step">
            <p class="mvs-step-eyebrow">${c.step2Eyebrow}</p>
            <div class="mvs-tool-grid mvs-tool-grid--three">
              ${c.secondary.map(secondaryCard).join("")}
            </div>
          </section>

          <section class="mvs-home-info">
            <div class="mvs-about-row">
              <div class="mvs-about-block">
                <h3 class="mvs-about-title">${c.whatHeading}</h3>
                <p>${c.whatBody}</p>
              </div>
              <div class="mvs-about-block">
                <h3 class="mvs-about-title">${c.useHeading}</h3>
                <p>${c.useBody}</p>
              </div>
              <div class="mvs-about-block">
                <h3 class="mvs-about-title">${c.notHeading}</h3>
                <p>${c.notBody}</p>
              </div>
            </div>
          </section>
        </div>
      `;

      // ---- Signed-in enhancement: greeting, profile status, style summary ----
      function styleLabel(sub) {
        const names = CONTENT.results.dimensionNames;
        const dims = [["drive", sub.drive], ["connection", sub.connection], ["clarity", sub.clarity]].sort(
          (a, b) => b[1] - a[1]
        );
        if (sub.pattern === "BALANCED") return "Balanced";
        if (sub.pattern === "DUAL") return names[dims[0][0]] + " & " + names[dims[1][0]];
        return names[dims[0][0]] + "-led";
      }

      async function enhanceForUser() {
        try {
          const token = await Auth.getAccessToken();
          const user = Auth.currentUser();
          if (!token || !user) return;
          const ctx = await Auth.loadContext();
          const nameFull = (ctx && ctx.profile && (ctx.profile.first_name || ctx.profile.display_name)) || "";
          const firstName = nameFull.split(" ")[0];
          const subRes = await SupabaseClient.select(
            "submissions",
            `user_id=eq.${user.id}&record_type=eq.everyday&order=created_at.desc`,
            token
          );
          const subs = subRes.ok ? subRes.data : [];
          const has = subs.length > 0;
          const style = has ? styleLabel(subs[0]) : "";

          const w = document.getElementById("home-welcome");
          w.innerHTML = `
            <strong>${c.welcomeBack(firstName)}</strong>
            <span>${has ? c.welcomeWithProfile(style) : c.welcomeNoProfile}</span>
            ${has ? `<a class="mvs-home-continue" href="account.html">${c.continueCta}</a>` : ""}
          `;
          w.hidden = false;

          const st = document.getElementById("home-feature-status");
          const featureCard = document.getElementById("home-feature-card");
          const cta = document.getElementById("home-feature-cta");
          if (has) {
            st.innerHTML = `<span class="mvs-status-badge mvs-status-badge--done">${c.statusCompleted}</span>`;
            featureCard.classList.add("is-complete");
            cta.textContent = c.featureRetakeCta;
          } else {
            st.innerHTML = `<span class="mvs-status-badge">${c.statusNotStarted}</span>`;
          }
          st.hidden = false;

          // Secondary statuses.
          const teamNote = (c.secondary.find((s) => s.icon === "team") || {}).availabilityNote || "";
          document.querySelectorAll('.mvs-tool-status[data-card="team"]').forEach((el) => {
            el.textContent = teamNote;
          });
          if (!has) {
            const lock = (c.secondary.find((s) => s.icon === "blindspot") || {}).lockNote || "";
            document.querySelectorAll('.mvs-tool-status[data-card="blindspot"]').forEach((el) => {
              el.innerHTML = `<span class="mvs-status-badge mvs-status-badge--lock">${lock}</span>`;
            });
          }
        } catch (e) {
          /* leave the brochure view as-is */
        }
      }

      if (typeof Auth !== "undefined" && Auth.isSignedIn()) enhanceForUser();
    })();
  </script>
</body>
</html>
