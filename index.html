<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Ways of Working — home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,wght@0,400;0,600;0,700;0,800;0,900;1,400&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="mvs-hero-band">
    <div class="mvs-hero-shape" aria-hidden="true"></div>
    <div class="mvs-hero-content">
      <svg class="mvs-hero-logo" viewBox="0 0 210 130" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ebi logo">
        <path d="M10,118 L10,62 A14,14 0 0 1 38,62 L38,118 Z" fill="#ffffff" />
        <path d="M46,118 L46,46 A14,14 0 0 1 74,46 L74,118 Z" fill="#ffffff" />
        <path d="M82,118 L82,24 A14,14 0 0 1 110,24 L110,70 Z" fill="#ffffff" />
        <path
          d="M110,24 L150,24 A14,14 0 0 1 164,38 L164,90 A28,28 0 0 1 136,118 L60,118 Z"
          fill="#93c467"
        />
        <line x1="110" y1="24" x2="60" y2="118" stroke="#4b0f8a" stroke-width="3" />
        <line x1="120" y1="46" x2="164" y2="46" stroke="#4b0f8a" stroke-width="3" />
        <line x1="105" y1="70" x2="164" y2="70" stroke="#4b0f8a" stroke-width="3" />
        <line x1="85" y1="94" x2="155" y2="94" stroke="#4b0f8a" stroke-width="3" />
      </svg>
      <div class="mvs-hero-word"><strong>ebi</strong><span>evidence based investing</span></div>
      <h1 class="mvs-hero-title" id="home-hero-title"></h1>
      <p class="mvs-hero-lead" id="home-hero-lead"></p>
    </div>
  </div>
  <main id="home-app" class="mvs-app"></main>

  <script src="js/content.js"></script>
  <script>
    (function () {
      // Simple inline glyphs — one per tool tile, white strokes on a
      // solid colour circle. Deliberately plain/geometric (no external
      // icon library) rather than an attempt at ebi's own proprietary
      // icon set, which this app doesn't have access to.
      const ICONS = {
        reflection: `
          <svg viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="5" y="4" width="14" height="17" rx="2" />
            <path d="M9 4V3a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v1" />
            <path d="M8.5 13l2 2 4-4" />
          </svg>`,
        guide: `
          <svg viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2.5" y="4" width="13" height="9" rx="3.5" />
            <path d="M6 13v3l3.2-3" />
            <rect x="9.5" y="8.5" width="12" height="8.5" rx="3.5" />
            <path d="M18 17v3l-3-3" />
          </svg>`,
        team: `
          <svg viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="9" cy="8" r="3" />
            <path d="M3.5 20a5.5 5.5 0 0 1 11 0" />
            <circle cx="17.5" cy="9" r="2.5" />
            <path d="M14.5 14.2a5 5 0 0 1 8 4.8" />
          </svg>`,
        blindspot: `
          <svg viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z" />
            <circle cx="12" cy="12" r="3" />
          </svg>`,
      };

      const c = CONTENT.home;
      document.getElementById("home-hero-title").textContent = c.title;
      document.getElementById("home-hero-lead").textContent = c.intro;

      const root = document.getElementById("home-app");
      root.innerHTML = `
        <div class="mvs-screen">
          <section class="mvs-section" style="border-top:none;padding-top:4px;">
            <h2 class="mvs-section-title">${c.cardsHeading}</h2>
            <div class="mvs-tool-grid">
              ${c.cards
                .map(
                  (card) => `
                <a class="mvs-tool-tile mvs-tool-tile--${card.accent}" href="${card.href}">
                  <span class="mvs-tool-icon">${ICONS[card.icon] || ""}</span>
                  <h2>${card.title}</h2>
                  <p>${card.body}</p>
                </a>
              `
                )
                .join("")}
            </div>
          </section>

          <section class="mvs-section mvs-about-block">
            <h2 class="mvs-section-title">${c.whatHeading}</h2>
            <p class="mvs-note">${c.whatBody}</p>
          </section>

          <section class="mvs-section mvs-about-block">
            <h2 class="mvs-section-title">${c.useHeading}</h2>
            <p class="mvs-note">${c.useBody}</p>
          </section>

          <section class="mvs-section mvs-about-block mvs-about-block--not">
            <h2 class="mvs-section-title">${c.notHeading}</h2>
            <p class="mvs-note">${c.notBody}</p>
          </section>

          <p class="mvs-note" style="text-align:center;margin-top:8px;">
            <a href="${c.adminLinkHref}">${c.adminLinkLabel}</a>
          </p>
        </div>
      `;
    })();
  </script>
</body>
</html>
