<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Conversa — confirm your email</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cpath d='M12,26 A21,21 0 0 1 50,21' fill='none' stroke='%2317305e' stroke-width='7' stroke-linecap='round'/%3E%3Cpath d='M53,28 A21,21 0 0 1 51,39' fill='none' stroke='%23a9c6e8' stroke-width='7' stroke-linecap='round'/%3E%3Cpath d='M47,46 A21,21 0 0 1 15,40' fill='none' stroke='%232f6fe6' stroke-width='7' stroke-linecap='round'/%3E%3Cpath d='M24,50 L15,60 L31,52 Z' fill='%232f6fe6'/%3E%3Ccircle cx='23' cy='31' r='3.1' fill='%2317305e'/%3E%3Ccircle cx='32' cy='31' r='3.1' fill='%2317305e'/%3E%3Ccircle cx='41' cy='31' r='3.1' fill='%2317305e'/%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,wght@0,400;0,600;0,700;0,800;0,900;1,400&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="mvs-header"></div>
  <main id="app" class="mvs-app" aria-live="polite"></main>

  <script src="js/content.js"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/nav.js"></script>
  <script>
    Nav.mount({ active: "", crumbs: [{ label: "Home", href: "index.html" }, { label: "Confirm email" }] });
  </script>
  <script>
    (function () {
      const root = document.getElementById("app");
      const c = (CONTENT.auth && CONTENT.auth.confirm) || {};

      function esc(s) {
        const d = document.createElement("div");
        d.textContent = String(s == null ? "" : s);
        return d.innerHTML;
      }

      function screen(title, body, buttons) {
        root.innerHTML =
          '<div class="mvs-screen">' +
          '<p class="mvs-eyebrow">' + esc(CONTENT.meta.shortName) + "</p>" +
          "<h1>" + esc(title) + "</h1>" +
          '<p class="mvs-lead">' + esc(body) + "</p>" +
          '<div class="mvs-btn-row">' + (buttons || "") + "</div>" +
          "</div>";
      }

      function btn(label, href, variant) {
        return '<a class="mvs-btn ' + variant + '" href="' + href + '">' + esc(label) + "</a>";
      }

      screen(c.workingTitle || "Confirming your email…", c.workingBody || "One moment…", "");

      (async function run() {
        let result = { ok: false, error: "no_token" };
        try {
          if (typeof Auth !== "undefined" && Auth.completeSessionFromHash) {
            result = await Auth.completeSessionFromHash();
          }
        } catch (e) {
          result = { ok: false, error: "unexpected" };
        }

        // Clear the tokens out of the address bar either way.
        try {
          history.replaceState(null, "", window.location.pathname);
        } catch (e) {
          /* ignore */
        }

        if (result.ok) {
          screen(
            c.successTitle || "Email confirmed",
            c.successBody || "You're signed in.",
            btn(c.successPrimaryCta || "Get started", "reflection.html", "mvs-btn--primary") +
              btn(c.successSecondaryCta || "Your account", "account.html", "mvs-btn--ghost")
          );
          // Refresh the nav so it reflects the signed-in state.
          try {
            if (typeof Nav !== "undefined" && Nav.mount) {
              Nav.mount({ active: "", crumbs: [{ label: "Home", href: "index.html" }, { label: "Confirm email" }] });
            }
          } catch (e) {
            /* ignore */
          }
        } else {
          screen(
            c.failTitle || "We couldn't confirm that link",
            c.failBody || "The link may have expired or already been used.",
            btn(c.failPrimaryCta || "Sign in", "login.html", "mvs-btn--primary") +
              btn(c.failSecondaryCta || "Create account", "register.html", "mvs-btn--ghost")
          );
        }
      })();
    })();
  </script>
</body>
</html>
